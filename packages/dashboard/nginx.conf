server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's internal DNS — resolve upstream hostnames per-request
    # so nginx doesn't cache a stale IP if the orchestrator restarts.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API and WebSocket to orchestrator.
    # $orch is a variable so nginx re-resolves the hostname via Docker DNS
    # on every request instead of caching the IP at startup time.
    location /api/ {
        set $orch orchestrator;
        proxy_pass http://$orch:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_cache off;
    }

    location /socket.io/ {
        set $orch orchestrator;
        proxy_pass http://$orch:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
