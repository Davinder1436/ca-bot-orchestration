version: "3.9"

services:
  # ── Infrastructure ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cabot
      POSTGRES_USER: cabot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cabot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application Services ────────────────────────────────────
  orchestrator:
    build:
      context: .
      dockerfile: packages/orchestrator/Dockerfile
    restart: unless-stopped
    command: sh -c "npx prisma db push --skip-generate && node dist/index.js"
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://cabot:${POSTGRES_PASSWORD}@postgres:5432/cabot
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      CAPTCHA_BACKEND_URL: http://captcha-backend:8000
      NODE_ENV: ${NODE_ENV:-production}
      GMAIL_USER: ${GMAIL_USER}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
      BRIGHTDATA_ISP_HOST: ${BRIGHTDATA_ISP_HOST:-brd.superproxy.io}
      BRIGHTDATA_ISP_PORT: ${BRIGHTDATA_ISP_PORT:-33335}
      BRIGHTDATA_ISP_USER: ${BRIGHTDATA_ISP_USER:-}
      BRIGHTDATA_ISP_PASS: ${BRIGHTDATA_ISP_PASS:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  dashboard:
    build:
      context: packages/dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - orchestrator

  email-service:
    build:
      context: .
      dockerfile: packages/email-service/Dockerfile
    restart: unless-stopped
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      GMAIL_USER: ${GMAIL_USER}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: packages/notification-service/Dockerfile
    restart: unless-stopped
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ADMIN_CHAT_ID: ${TELEGRAM_ADMIN_CHAT_ID}
      ORCHESTRATOR_URL: http://orchestrator:3000
    depends_on:
      redis:
        condition: service_healthy

  captcha-backend:
    build:
      context: captcha-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      ADMIN_API_KEY: ${CAPTCHA_ADMIN_KEY}
      BACKEND_URL: ${CAPTCHA_BACKEND_URL:-http://captcha-backend:8000}

  worker:
    build:
      context: .
      dockerfile: packages/worker/Dockerfile
    restart: unless-stopped
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CAPTCHA_BACKEND_URL: http://captcha-backend:8000
      NODE_ENV: ${NODE_ENV:-production}
      GMAIL_USER: ${GMAIL_USER}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
      captcha-backend:
        condition: service_started
    deploy:
      replicas: 1  # scale with: docker compose up --scale worker=20
    shm_size: 1gb  # Chromium needs shared memory

volumes:
  postgres_data:
  redis_data:
